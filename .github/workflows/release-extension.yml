name: Release Extension

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-extension-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          current_version="$(node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); process.stdout.write(pkg.version);")"
          previous_version=""
          changed="false"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            changed="true"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${BEFORE_SHA}:package.json" 2>/dev/null; then
            previous_version="$(git show "${BEFORE_SHA}:package.json" | node -e "const fs = require('node:fs'); const pkg = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(pkg.version);")"

            if [[ "${current_version}" != "${previous_version}" ]]; then
              changed="true"
            fi
          else
            changed="true"
          fi

          printf 'version=%s\n' "${current_version}" >> "${GITHUB_OUTPUT}"
          printf 'tag=v%s\n' "${current_version}" >> "${GITHUB_OUTPUT}"
          printf 'changed=%s\n' "${changed}" >> "${GITHUB_OUTPUT}"

          if [[ "${changed}" == "true" ]]; then
            printf 'Detected package version change: %s -> %s\n' "${previous_version:-none}" "${current_version}"
          else
            printf 'package.json changed, but version stayed at %s. Skipping release.\n' "${current_version}"
          fi

      - name: Setup Bun
        if: steps.version.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: bun install

      - name: Setup Chrome
        if: steps.version.outputs.changed == 'true'
        uses: browser-actions/setup-chrome@v1

      - name: Build release assets
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          CHROME_CRX_PRIVATE_KEY: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}
          EDGE_CRX_PRIVATE_KEY: ${{ secrets.EDGE_CRX_PRIVATE_KEY }}
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          detect_chrome_bin() {
            if [[ -n "${CHROME_BIN:-}" && -x "${CHROME_BIN}" ]]; then
              printf '%s\n' "${CHROME_BIN}"
              return 0
            fi

            local candidates=(
              google-chrome
              google-chrome-stable
              chromium
              chromium-browser
              chrome
            )

            local candidate
            for candidate in "${candidates[@]}"; do
              if command -v "${candidate}" >/dev/null 2>&1; then
                command -v "${candidate}"
                return 0
              fi
            done

            echo "Chrome binary not found. Set CHROME_BIN first." >&2
            exit 1
          }

          write_key_file() {
            local key_content="$1"
            local key_path="$2"

            printf '%s' "${key_content}" > "${key_path}"
            chmod 600 "${key_path}"
          }

          zip_dir() {
            local source_dir="$1"
            local output_path="$2"

            rm -f "${output_path}"
            (
              cd "${GITHUB_WORKSPACE}/${source_dir}"
              zip -qr "${output_path}" . -x '*.DS_Store' '*/.DS_Store'
            )
          }

          pack_crx_if_key() {
            local chrome_bin="$1"
            local source_dir="$2"
            local key_content="$3"
            local key_path="$4"
            local output_path="$5"
            local browser_name="$6"
            local packed_path="${GITHUB_WORKSPACE}/${source_dir}.crx"

            if [[ -z "${key_content}" ]]; then
              printf 'Skipping %s CRX packaging because no private key secret is configured.\n' "${browser_name}"
              return 0
            fi

            rm -f "${packed_path}" "${output_path}"
            write_key_file "${key_content}" "${key_path}"

            "${chrome_bin}" \
              --no-sandbox \
              --pack-extension="${GITHUB_WORKSPACE}/${source_dir}" \
              --pack-extension-key="${key_path}"

            mv "${packed_path}" "${output_path}"
          }

          release_dir="${GITHUB_WORKSPACE}/release"
          temp_dir="$(mktemp -d)"

          trap 'rm -rf "'"${temp_dir}"'"; rm -f "'"${GITHUB_WORKSPACE}"'/dist.crx" "'"${GITHUB_WORKSPACE}"'/dist-edge.crx"' EXIT

          chrome_key="${CHROME_CRX_PRIVATE_KEY:-${CRX_PRIVATE_KEY:-}}"
          edge_key="${EDGE_CRX_PRIVATE_KEY:-${CRX_PRIVATE_KEY:-}}"
          chrome_key_path="${temp_dir}/chrome.pem"
          edge_key_path="${temp_dir}/edge.pem"
          chrome_output="${release_dir}/youran-tab-chrome-${VERSION}.zip"
          chrome_store_output="${release_dir}/youran-tab-chrome-webstore-${VERSION}.zip"
          chrome_crx_output="${release_dir}/youran-tab-chrome-${VERSION}.crx"
          edge_output="${release_dir}/youran-tab-edge-${VERSION}.zip"
          edge_crx_output="${release_dir}/youran-tab-edge-${VERSION}.crx"
          firefox_output="${release_dir}/youran-tab-firefox-${VERSION}-unsigned.xpi"
          chrome_bin=""

          mkdir -p "${release_dir}"

          bun run build
          bun run build:edge
          bun run build:firefox

          zip_dir dist "${chrome_output}"
          zip_dir dist "${chrome_store_output}"
          zip_dir dist-edge "${edge_output}"
          zip_dir dist-firefox "${firefox_output}"

          if [[ -n "${chrome_key}" || -n "${edge_key}" ]]; then
            chrome_bin="$(detect_chrome_bin)"
          fi

          pack_crx_if_key "${chrome_bin}" dist "${chrome_key}" "${chrome_key_path}" "${chrome_crx_output}" "Chrome"
          pack_crx_if_key "${chrome_bin}" dist-edge "${edge_key}" "${edge_key_path}" "${edge_crx_output}" "Edge"

          printf 'Created %s\n' "${chrome_output}"
          printf 'Created %s\n' "${chrome_store_output}"
          printf 'Created %s\n' "${edge_output}"
          printf 'Created %s\n' "${firefox_output}"
          if [[ -f "${chrome_crx_output}" ]]; then
            printf 'Created %s\n' "${chrome_crx_output}"
          fi
          if [[ -f "${edge_crx_output}" ]]; then
            printf 'Created %s\n' "${edge_crx_output}"
          fi

      - name: Publish GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          shopt -s nullglob
          assets=(release/*.crx release/*.zip release/*.xpi)
          release_notes="$(mktemp)"

          printf '完整版本记录请看：\n%s\n' 'https://youran-tab.du-fu.com/#changelog' > "${release_notes}"

          if (( ${#assets[@]} == 0 )); then
            printf 'No release assets found.\n' >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" \
              --title "youran-tab ${VERSION}" \
              --notes-file "${release_notes}"
            gh release upload "${TAG_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${assets[@]}" \
              --title "youran-tab ${VERSION}" \
              --notes-file "${release_notes}"
          fi

      - name: Validate Chrome Web Store secrets
        if: steps.version.outputs.changed == 'true'
        env:
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${CWS_EXTENSION_ID}" ]] || missing+=("CWS_EXTENSION_ID")
          [[ -n "${CWS_PUBLISHER_ID}" ]] || missing+=("CWS_PUBLISHER_ID")
          [[ -n "${CWS_SERVICE_ACCOUNT_JSON}" ]] || missing+=("CWS_SERVICE_ACCOUNT_JSON")

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Authenticate Chrome Web Store API
        id: cws-auth
        if: steps.version.outputs.changed == 'true'
        env:
          CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
        shell: bash
        run: |
          set -euo pipefail

          token_request="$(mktemp)"
          token_body="$(mktemp)"

          node > "${token_request}" <<'NODE'
          const crypto = require('node:crypto');

          const serviceAccount = JSON.parse(process.env.CWS_SERVICE_ACCOUNT_JSON);
          const now = Math.floor(Date.now() / 1000);
          const base64url = (value) => Buffer.from(JSON.stringify(value)).toString('base64url');
          const header = { alg: 'RS256', typ: 'JWT' };
          const claim = {
            iss: serviceAccount.client_email,
            scope: 'https://www.googleapis.com/auth/chromewebstore',
            aud: 'https://oauth2.googleapis.com/token',
            iat: now,
            exp: now + 3600,
          };
          const unsignedToken = `${base64url(header)}.${base64url(claim)}`;
          const signer = crypto.createSign('RSA-SHA256');
          signer.update(unsignedToken);
          const signature = signer.sign(serviceAccount.private_key).toString('base64url');
          const assertion = `${unsignedToken}.${signature}`;

          process.stdout.write(
            new URLSearchParams({
              grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer',
              assertion,
            }).toString(),
          );
          NODE

          token_code="$(curl -sS -w '%{http_code}' -o "${token_body}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data @"${token_request}" \
            "https://oauth2.googleapis.com/token")"

          if [[ "${token_code}" != 2* ]]; then
            cat "${token_body}"
            printf '\n'
            printf 'Chrome Web Store token exchange failed with HTTP %s.\n' "${token_code}" >&2
            exit 1
          fi

          access_token="$(node -e "const fs = require('node:fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8') || '{}'); process.stdout.write(String(data.access_token || ''));" "${token_body}")"
          if [[ -z "${access_token}" ]]; then
            cat "${token_body}"
            printf '\n'
            printf 'Chrome Web Store token exchange did not return access_token.\n' >&2
            exit 1
          fi

          echo "::add-mask::${access_token}"
          printf 'access_token=%s\n' "${access_token}" >> "${GITHUB_OUTPUT}"

      - name: Publish to Chrome Web Store
        if: steps.version.outputs.changed == 'true'
        env:
          CWS_ACCESS_TOKEN: ${{ steps.cws-auth.outputs.access_token }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          upload_file="${GITHUB_WORKSPACE}/release/youran-tab-chrome-webstore-${VERSION}.zip"
          item_name="publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}"
          upload_url="https://chromewebstore.googleapis.com/upload/v2/${item_name}:upload"
          status_url="https://chromewebstore.googleapis.com/v2/${item_name}:fetchStatus"
          publish_url="https://chromewebstore.googleapis.com/v2/${item_name}:publish"

          if [[ ! -f "${upload_file}" ]]; then
            printf 'Chrome Web Store upload package not found: %s\n' "${upload_file}" >&2
            exit 1
          fi

          read_json_field() {
            local file_path="$1"
            local field_name="$2"
            node -e "const fs = require('node:fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8') || '{}'); process.stdout.write(String(data[process.argv[2]] || ''));" "${file_path}" "${field_name}"
          }

          assert_success_response() {
            local http_code="$1"
            local body_path="$2"
            local action_name="$3"

            cat "${body_path}"
            printf '\n'

            if [[ "${http_code}" != 2* ]]; then
              printf '%s failed with HTTP %s.\n' "${action_name}" "${http_code}" >&2
              exit 1
            fi
          }

          upload_body="$(mktemp)"
          upload_code="$(curl -sS -w '%{http_code}' -o "${upload_body}" \
            -H "Authorization: Bearer ${CWS_ACCESS_TOKEN}" \
            -H "Content-Type: application/zip" \
            -X POST \
            -T "${upload_file}" \
            "${upload_url}")"
          assert_success_response "${upload_code}" "${upload_body}" "Chrome Web Store upload"

          upload_state="$(read_json_field "${upload_body}" "uploadState")"

          if [[ "${upload_state}" == "IN_PROGRESS" || "${upload_state}" == "UPLOAD_IN_PROGRESS" ]]; then
            for attempt in {1..30}; do
              sleep 10

              status_body="$(mktemp)"
              status_code="$(curl -sS -w '%{http_code}' -o "${status_body}" \
                -H "Authorization: Bearer ${CWS_ACCESS_TOKEN}" \
                -X GET \
                "${status_url}")"
              assert_success_response "${status_code}" "${status_body}" "Chrome Web Store fetchStatus"

              upload_state="$(read_json_field "${status_body}" "lastAsyncUploadState")"
              if [[ "${upload_state}" != "IN_PROGRESS" && "${upload_state}" != "UPLOAD_IN_PROGRESS" ]]; then
                break
              fi

              printf 'Chrome Web Store upload is still processing. Attempt %s/30.\n' "${attempt}"
            done
          fi

          if [[ "${upload_state}" == "FAILED" || "${upload_state}" == "NOT_FOUND" ]]; then
            printf 'Chrome Web Store upload did not succeed. State: %s\n' "${upload_state}" >&2
            exit 1
          fi

          if [[ "${upload_state}" == "IN_PROGRESS" || "${upload_state}" == "UPLOAD_IN_PROGRESS" ]]; then
            printf 'Chrome Web Store upload is still processing after polling.\n' >&2
            exit 1
          fi

          publish_body="$(mktemp)"
          publish_code="$(curl -sS -w '%{http_code}' -o "${publish_body}" \
            -H "Authorization: Bearer ${CWS_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST \
            -d '{"publishType":"DEFAULT_PUBLISH","blockOnWarnings":true}' \
            "${publish_url}")"
          assert_success_response "${publish_code}" "${publish_body}" "Chrome Web Store publish"
